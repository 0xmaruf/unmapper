<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS SourceMap Unmapper by 0xmaruf</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DXHE18TRPY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-DXHE18TRPY');
</script>
</head>
<body>

<h2>JS SourceMap Unmapper by 0xmaruf</h2>

<div class="container">

    <!-- URL Mode -->
    <div>
        <h3>1. Load SourceMap from URL === recommended if target cors does not block</h3>
        <input id="sourcemapUrl" type="text" placeholder="Enter .map file URL">
        <button onclick="loadFromURL()">Fetch & Unmap</button>
    </div>

    <hr>

    <!-- File Upload Mode -->
    <div>
        <h3>2. Upload .map File (or drag & drop anywhere)====> recommended for large file</h3>
        <input type="file" id="fileInput" accept=".map,.json" onchange="loadFromFile()">
    </div>

    <hr>

    <!-- Paste Mode -->
    <div>
        <h3>3. Paste SourceMap JSON ====> recommended for small/medium file</h3>
        <textarea id="sourcemapText" placeholder="Paste entire .map JSON here"></textarea>
        <button onclick="loadFromText()">Unmap Pasted Code</button>
    </div>

</div>

<div class="actions">
    <button onclick="findSecrets()" class="btn-danger">🔍 Find Secrets</button>
    <button onclick="findEndpoints()" class="btn-info">🌐 Find Endpoints</button>
    <button onclick="copyOutput()">📋 Copy Output</button>
    <button onclick="clearOutput()">🗑️ Clear</button>
</div>

<div id="output"></div>
<pre id="secrets" style="display:none;"></pre>

<script src="script.js"></script>
</body>
</html>
